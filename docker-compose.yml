name: ed-simulation

services:
  backend:
    image: ed-simulation-backend
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      PORT: 8000
      SIMULATION_ARTIFACT_ROOT: /app/runtime/artifacts
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ${ARTIFACTS_HOST_PATH:-./data/runtime/artifacts}:/app/runtime/artifacts
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

  frontend:
    image: ed-simulation-frontend
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - app

networks:
  app:
    driver: bridge
